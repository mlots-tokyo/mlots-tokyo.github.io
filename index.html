<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chikaarashi Rikito | iOS Apps</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-sub: #8e8e93;
            --accent: #007AFF;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        header {
            padding: 20px 20px 8px;
            text-align: left;
            max-width: 480px;
            margin: 0 auto;
        }
        h1 { font-size: 22px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .sub-header { color: var(--text-sub); font-size: 13px; margin-top: 2px; }

        .container {
            padding: 0 15px;
            max-width: 480px;
            margin: 0 auto;
        }

        .app-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .app-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .app-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            background: #e5e5ea;
            object-fit: cover;
            margin-right: 12px;
            border: 0.5px solid rgba(0,0,0,0.1);
        }

        .app-title-area h2 {
            font-size: 16px;
            font-weight: 700;
            margin: 0;
            line-height: 1.2;
        }

        .app-category {
            color: var(--text-sub);
            font-size: 11px;
            margin-top: 2px;
        }

        .app-description {
            font-size: 12.5px;
            color: #3a3a3c;
            margin-bottom: 10px;
            line-height: 1.35;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 38px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn:active { opacity: 0.7; }
        .btn-main { background-color: var(--accent); color: #ffffff; }
        .btn-sub { background-color: #f2f2f7; color: var(--accent); }

        footer {
            text-align: center;
            padding: 10px 20px 20px;
            color: var(--text-sub);
            font-size: 10.5px;
        }

        footer a { color: var(--text-sub); text-decoration: underline; }
    </style>
</head>
<body>

<header>
    <h1>Chikaarashi Rikito</h1>
    <p class="sub-header">iOS Application Projects</p>
</header>

<div class="container">
    <section class="app-card">
        <div class="app-header">
            <img src="icon-stocker.png" alt="App Stocker" class="app-icon" onerror="this.style.backgroundColor='#007AFF'">
            <div class="app-title-area">
                <h2>App Stocker</h2>
                <div class="app-category">ユーティリティ</div>
            </div>
        </div>
        <p class="app-description">
            気になるアプリをスマートに管理。App Storeの価格変化をチェックするためのウィッシュリスト。
        </p>
        <div class="action-buttons">
            <a href="https://apps.apple.com/jp/app/id6759819675" target="_blank" class="btn btn-main">App Store</a>
            <a href="https://mlots-tokyo.github.io/app-stocker-docs/privacy.html" class="btn btn-sub">Privacy</a>
        </div>
    </section>

    <section class="app-card">
        <div class="app-header">
            <img src="icon-todaydo.png" alt="To Day Do" class="app-icon" onerror="this.style.backgroundColor='#34C759'">
            <div class="app-title-area">
                <h2>To Day Do</h2>
                <div class="app-category">仕事効率化</div>
            </div>
        </div>
        <p class="app-description">
            「今日」に集中するタスク管理。シンプルな操作で、日々のタスクを確実にクリア。
        </p>
        <div class="action-buttons">
            <a href="https://apps.apple.com/jp/app/id6759670393" target="_blank" class="btn btn-main">App Store</a>
            <a href="https://mlots-tokyo.github.io/to-day-do-docs/privacy.html" class="btn btn-sub">Privacy</a>
        </div>
    </section>
</div>

<footer>
    <p>
        Contact: <a href="mailto:mlots.tokyo@gmail.com">mlots.tokyo@gmail.com</a> | &copy; 2026 Mlots
    </p>
</footer>

</body>
</html>
